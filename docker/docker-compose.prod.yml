version: '3.8'

# Production Docker Compose — Arvan Cloud VPS
# All secrets injected via environment variables
#
# NOTE on Docker Swarm vs plain Compose:
#   - The `deploy:` blocks (replicas, resources, update_config) are Swarm-only and
#     are silently ignored by plain `docker compose`. They are kept here as documentation
#     of intended production resource limits for Swarm deployments.
#   - Networks use `bridge` driver (works on both Swarm and plain Compose).
#     For Swarm mode, change to `overlay` with `attachable: true`.

networks:
  internal:
    driver: bridge
  external:
    driver: bridge

volumes:
  pg_data:
  redis_data:
  minio_data:
  nginx_ssl:

services:

  # ── Nginx reverse proxy ───────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    networks: [external, internal]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_ssl:/etc/nginx/ssl
    depends_on:
      - nextjs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # ── Next.js application ───────────────────────────────────────
  nextjs:
    image: ghcr.io/${GITHUB_ORG}/football:${IMAGE_TAG:-latest}
    networks: [internal]
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_SENTINEL_HOSTS: ${REDIS_SENTINEL_HOSTS}
      REDIS_SENTINEL_NAME: ${REDIS_SENTINEL_NAME:-mymaster}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      NATIONAL_ID_ENCRYPTION_KEY: ${NATIONAL_ID_ENCRYPTION_KEY}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_REGION: ${S3_REGION:-ir-thr-at1}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET}
      S3_URL_EXPIRY: ${S3_URL_EXPIRY:-900}
      KAVEH_NEGAR_API_KEY: ${KAVEH_NEGAR_API_KEY}
      KAVEH_NEGAR_TEMPLATE_OTP: ${KAVEH_NEGAR_TEMPLATE_OTP}
      KAVEH_NEGAR_WEBHOOK_SECRET: ${KAVEH_NEGAR_WEBHOOK_SECRET}
      KAVEH_NEGAR_SENDER: ${KAVEH_NEGAR_SENDER}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY}
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${NEXT_PUBLIC_TURNSTILE_SITE_KEY}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      OTP_EXPIRY_SECONDS: ${OTP_EXPIRY_SECONDS:-120}
      OTP_MAX_PER_MOBILE_PER_15MIN: ${OTP_MAX_PER_MOBILE_PER_15MIN:-5}
      OTP_MAX_FAILURES_PER_HOUR: ${OTP_MAX_FAILURES_PER_HOUR:-5}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    restart: unless-stopped
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
      update_config:
        parallelism: 1
        delay: 30s
        failure_action: rollback

  # ── BullMQ scoring worker ─────────────────────────────────────
  worker:
    image: ghcr.io/${GITHUB_ORG}/football-worker:${IMAGE_TAG:-latest}
    networks: [internal]
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_SENTINEL_HOSTS: ${REDIS_SENTINEL_HOSTS}
      REDIS_SENTINEL_NAME: ${REDIS_SENTINEL_NAME:-mymaster}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      NATIONAL_ID_ENCRYPTION_KEY: ${NATIONAL_ID_ENCRYPTION_KEY}
    restart: unless-stopped
    deploy:
      replicas: 1    # only one scoring worker — concurrency=1 in worker config
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # ── PgBouncer connection pooler ───────────────────────────────
  pgbouncer:
    image: pgbouncer/pgbouncer:1.22
    networks: [internal]
    environment:
      DATABASES_HOST: postgres
      DATABASES_PORT: 5432
      DATABASES_DBNAME: ${POSTGRES_DB:-football}
      DATABASES_USER: ${POSTGRES_USER:-football}
      DATABASES_PASSWORD: ${POSTGRES_PASSWORD}
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 200
      DEFAULT_POOL_SIZE: 25
      MIN_POOL_SIZE: 5
      RESERVE_POOL_SIZE: 5
      SERVER_IDLE_TIMEOUT: 600
    healthcheck:
      test: ["CMD", "psql", "-h", "localhost", "-p", "6432", "-U", "pgbouncer", "-c", "SHOW STATS"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ── PostgreSQL 16 ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    networks: [internal]
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-football}
      POSTGRES_USER:     ${POSTGRES_USER:-football}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-football}"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G

  # ── Redis primary ─────────────────────────────────────────────
  redis-primary:
    image: redis:7-alpine
    networks: [internal]
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis Sentinel (HA) ───────────────────────────────────────
  redis-sentinel-1:
    image: redis:7-alpine
    networks: [internal]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    # Generate sentinel.conf from env vars at container startup (no Swarm configs: needed)
    entrypoint:
      - /bin/sh
      - -c
      - |
        cat > /etc/sentinel.conf <<EOF
        port 26379
        sentinel monitor mymaster redis-primary 6379 2
        sentinel auth-pass mymaster $$REDIS_PASSWORD
        sentinel down-after-milliseconds mymaster 5000
        sentinel failover-timeout mymaster 60000
        sentinel parallel-syncs mymaster 1
        EOF
        exec redis-sentinel /etc/sentinel.conf
    restart: unless-stopped

  # ── MinIO object storage (or use Arvan Object Storage) ────────
  minio:
    image: minio/minio:latest
    networks: [internal]
    environment:
      MINIO_ROOT_USER:     ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped
    # MinIO is NOT exposed to internet — access only via signed URLs through app

  # ── Nightly backup ────────────────────────────────────────────
  backup:
    image: postgres:16-alpine
    networks: [internal]
    environment:
      PGPASSWORD:    ${POSTGRES_PASSWORD}
      POSTGRES_DB:   ${POSTGRES_DB:-football}
      POSTGRES_USER: ${POSTGRES_USER:-football}
      S3_ENDPOINT:   ${S3_ENDPOINT}
      S3_REGION:     ${S3_REGION:-ir-thr-at1}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET:     ${S3_BUCKET}-backups
    volumes:
      - ./scripts/backup.sh:/backup.sh:ro
    # Install awscli then run backup daily at 03:00 (container starts, waits 24h, loops)
    entrypoint:
      - /bin/sh
      - -c
      - |
        apk add --no-cache aws-cli
        # Configure AWS credentials
        mkdir -p /root/.aws
        printf "[default]\naws_access_key_id = %s\naws_secret_access_key = %s\n" \
          "$$S3_ACCESS_KEY" "$$S3_SECRET_KEY" > /root/.aws/credentials
        printf "[default]\nregion = %s\n" "$$S3_REGION" > /root/.aws/config
        # Run backup daily
        while true; do sleep 86400; sh /backup.sh; done
    restart: unless-stopped
