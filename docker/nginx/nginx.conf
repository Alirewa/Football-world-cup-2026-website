user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  4096;
    multi_accept        on;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging ──────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" "$request_time"ms';
    access_log /var/log/nginx/access.log main;

    # ── Performance ───────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    gzip               on;
    gzip_types         text/plain application/json text/css application/javascript image/svg+xml;
    gzip_min_length    1024;

    # ── Rate limiting (additional layer on top of app-level) ──────
    limit_req_zone  $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone  $binary_remote_addr zone=auth:10m rate=5r/m;

    # ── Upstream ──────────────────────────────────────────────────
    upstream nextjs {
        server nextjs:3000;
        keepalive 32;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────────
    server {
        listen      80;
        server_name _;
        return 301  https://$host$request_uri;
    }

    # ── Main HTTPS server ─────────────────────────────────────────
    server {
        listen      443 ssl http2;
        server_name football.ir www.football.ir;

        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        # ── Security headers ──────────────────────────────────────
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options           "DENY" always;
        add_header X-Content-Type-Options    "nosniff" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "geolocation=(), camera=(), microphone=()" always;
        add_header Content-Security-Policy
            "default-src 'self';
             script-src 'self' 'unsafe-inline' challenges.cloudflare.com;
             style-src 'self' 'unsafe-inline';
             img-src 'self' data: blob:;
             font-src 'self';
             connect-src 'self' challenges.cloudflare.com;
             frame-src challenges.cloudflare.com;
             object-src 'none';
             base-uri 'self';
             form-action 'self';"
            always;

        client_max_body_size 2m;  # Avatar uploads max 500KB; request overhead

        # ── Static files with long cache ──────────────────────────
        location /_next/static/ {
            proxy_pass         http://nextjs;
            expires            1y;
            add_header         Cache-Control "public, immutable";
            proxy_set_header   Host $host;
        }

        location /fonts/ {
            proxy_pass         http://nextjs;
            expires            1y;
            add_header         Cache-Control "public, immutable";
        }

        # ── SSE — live match score stream ─────────────────────────
        # Must disable buffering or browser never receives events
        location ~ ^/api/v1/matches/[^/]+/stream$ {
            proxy_pass               http://nextjs;
            proxy_http_version       1.1;
            proxy_set_header         Connection '';
            proxy_set_header         Host $host;
            proxy_set_header         X-Real-IP $remote_addr;
            proxy_set_header         X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_buffering          off;
            proxy_cache              off;
            proxy_read_timeout       3600s;    # SSE connection stays open
            proxy_send_timeout       3600s;
            chunked_transfer_encoding on;
            add_header               X-Accel-Buffering no;
            # Keep security headers
            add_header X-Frame-Options "DENY" always;
            add_header X-Content-Type-Options "nosniff" always;
        }

        # ── Auth endpoints — tighter rate limit ───────────────────
        location /api/v1/auth/ {
            limit_req        zone=auth burst=10 nodelay;
            limit_req_status 429;
            proxy_pass       http://nextjs;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── All other API routes ──────────────────────────────────
        location /api/ {
            limit_req        zone=api burst=50 nodelay;
            limit_req_status 429;
            proxy_pass       http://nextjs;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection keep-alive;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # ── Next.js app ───────────────────────────────────────────
        location / {
            proxy_pass         http://nextjs;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection keep-alive;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }
    }
}
