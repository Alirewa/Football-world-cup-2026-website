<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 320">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fdba74"/>
      <stop offset="50%" stop-color="#ea580c"/>
      <stop offset="100%" stop-color="#9a3412"/>
    </linearGradient>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fed7aa"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <radialGradient id="bglow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fb923c" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#ea580c" stop-opacity="0"/>
    </radialGradient>
    <filter id="bshadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#ea580c" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Glow -->
  <ellipse cx="140" cy="160" rx="90" ry="90" fill="url(#bglow)" opacity="0.4"/>

  <!-- Medal ribbon -->
  <rect x="120" y="20" width="40" height="80" rx="4" fill="url(#bg1)" opacity="0.8"/>
  <!-- Ribbon stripes -->
  <rect x="120" y="20" width="13" height="80" rx="2" fill="#c2410c" opacity="0.5"/>
  <rect x="147" y="20" width="13" height="80" rx="2" fill="#9a3412" opacity="0.5"/>

  <!-- Ribbon V-cut at bottom -->
  <polygon points="120,100 160,100 140,120" fill="url(#bg1)"/>

  <!-- Medal ring -->
  <circle cx="140" cy="108" r="10" fill="none" stroke="url(#bg1)" stroke-width="6"/>

  <!-- Medal disc -->
  <circle cx="140" cy="200" r="80" fill="url(#bg1)" filter="url(#bshadow)"/>
  <!-- Shine -->
  <circle cx="140" cy="200" r="80" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="3"/>
  <ellipse cx="120" cy="175" rx="22" ry="28" fill="rgba(255,255,255,0.12)" transform="rotate(-20,120,175)"/>

  <!-- Inner ring -->
  <circle cx="140" cy="200" r="65" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>

  <!-- Medal center: number 3 or star -->
  <text x="140" y="195" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="52" font-weight="900"
        fill="rgba(255,255,255,0.9)" dominant-baseline="middle">3</text>

  <!-- Stars around -->
  <g fill="rgba(255,255,255,0.5)" font-size="10">
    <text x="87" y="175" text-anchor="middle">★</text>
    <text x="193" y="175" text-anchor="middle">★</text>
    <text x="140" y="150" text-anchor="middle">★</text>
    <text x="140" y="260" text-anchor="middle">★</text>
  </g>

  <!-- WC 2026 text -->
  <text x="140" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="700"
        fill="rgba(255,255,255,0.7)" letter-spacing="2">WC 2026</text>
</svg>
