<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 320">
  <defs>
    <linearGradient id="sg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f4f8"/>
      <stop offset="50%" stop-color="#cbd5e1"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>
    <linearGradient id="sg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>
    <radialGradient id="sglow" cx="50%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#e2e8f0" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#94a3b8" stop-opacity="0"/>
    </radialGradient>
    <filter id="sshadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#94a3b8" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Glow -->
  <ellipse cx="140" cy="100" rx="100" ry="80" fill="url(#sglow)" opacity="0.5"/>

  <!-- Trophy base -->
  <rect x="90" y="265" width="100" height="14" rx="7" fill="url(#sg1)" filter="url(#sshadow)"/>
  <rect x="105" y="250" width="70" height="20" rx="4" fill="url(#sg1)"/>
  <rect x="118" y="200" width="44" height="55" rx="3" fill="url(#sg1)"/>

  <!-- Trophy body -->
  <path d="M80 80 Q70 160 118 200 L162 200 Q210 160 200 80 Z" fill="url(#sg1)" filter="url(#sshadow)"/>
  <path d="M95 90 Q88 140 112 175" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="4" stroke-linecap="round"/>
  <path d="M108 84 Q103 110 115 140" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Cup rim -->
  <ellipse cx="140" cy="80" rx="62" ry="12" fill="url(#sg2)"/>

  <!-- Handles -->
  <path d="M80 100 Q40 110 45 150 Q50 185 80 185" fill="none" stroke="url(#sg1)" stroke-width="14" stroke-linecap="round"/>
  <path d="M200 100 Q240 110 235 150 Q230 185 200 185" fill="none" stroke="url(#sg1)" stroke-width="14" stroke-linecap="round"/>

  <!-- Star on cup -->
  <g transform="translate(140,140)" fill="white" opacity="0.85">
    <polygon points="0,-22 5,-8 20,-8 9,1 13,16 0,7 -13,16 -9,1 -20,-8 -5,-8" />
  </g>

  <!-- WC 2026 text -->
  <text x="140" y="232" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="10" font-weight="900" fill="#475569" letter-spacing="2">WC 2026</text>

  <!-- Ribbon -->
  <path d="M110 295 Q140 310 170 295" fill="none" stroke="#94a3b8" stroke-width="5" stroke-linecap="round"/>
</svg>
