<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 320">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE169"/>
      <stop offset="50%" stop-color="#F5B700"/>
      <stop offset="100%" stop-color="#c99600"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff9c4"/>
      <stop offset="100%" stop-color="#F5B700"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#ffe57a" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#c99600" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#c99600" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Glow background -->
  <ellipse cx="140" cy="100" rx="100" ry="80" fill="url(#glow)" opacity="0.6"/>

  <!-- Trophy base -->
  <rect x="90" y="265" width="100" height="14" rx="7" fill="url(#g1)" filter="url(#shadow)"/>
  <rect x="105" y="250" width="70" height="20" rx="4" fill="url(#g1)"/>
  <rect x="118" y="200" width="44" height="55" rx="3" fill="url(#g1)"/>

  <!-- Trophy body (main cup) -->
  <path d="M80 80 Q70 160 118 200 L162 200 Q210 160 200 80 Z" fill="url(#g1)" filter="url(#shadow)"/>
  <!-- Cup shine -->
  <path d="M95 90 Q88 140 112 175" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="4" stroke-linecap="round"/>
  <path d="M108 84 Q103 110 115 140" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Cup rim -->
  <ellipse cx="140" cy="80" rx="62" ry="12" fill="url(#g2)"/>

  <!-- Handles -->
  <path d="M80 100 Q40 110 45 150 Q50 185 80 185" fill="none" stroke="url(#g1)" stroke-width="14" stroke-linecap="round"/>
  <path d="M200 100 Q240 110 235 150 Q230 185 200 185" fill="none" stroke="url(#g1)" stroke-width="14" stroke-linecap="round"/>

  <!-- Star on cup -->
  <g transform="translate(140,140)" fill="#fff9c4" opacity="0.9">
    <polygon points="0,-22 5,-8 20,-8 9,1 13,16 0,7 -13,16 -9,1 -20,-8 -5,-8" />
  </g>

  <!-- WC 2026 text -->
  <text x="140" y="232" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="10" font-weight="900" fill="#7a5c00" letter-spacing="2">WC 2026</text>

  <!-- Crown -->
  <g transform="translate(140,42)" fill="url(#g1)">
    <polygon points="-30,0 -30,-28 -15,-14 0,-28 15,-14 30,-28 30,0" />
    <circle cx="-30" cy="-30" r="5" fill="#FFE169"/>
    <circle cx="0" cy="-30" r="5" fill="#FFE169"/>
    <circle cx="30" cy="-30" r="5" fill="#FFE169"/>
  </g>
</svg>
